title: "Low Bass EQ"
description: >
  Sub:  Filter parameters from Google Gemini to match SCMs. 
  Mains:  No processing, but add delay to align with sub.

devices:
  capture_samplerate: 44100
  # High sample rate to allow for high quality filtering.
  # Current value is 4*capture_samplerate.
  samplerate: 176400
  enable_rate_adjust: true
  chunksize: 8192
  # Increase target level to avoid underruns.  Current value is 
  # max alllowed;  it probably could be less.
  target_level: 16383
  resampler:
    type: Synchronous
  capture:
    # Read from the default subdevice of the ALSA loopback device 
    # fed by Quod Libet.
    type: Alsa
    channels: 2
    device: "hw:qlloop,1,0"
    format: S16LE
  playback:
    # RME Digiface USB.  Channels 0 and 1 are mains, 2 is sub.  
    # The Digiface USB supports different sample rates depending on how many inputs
    # and outputs are in use.  The current (2024) Linux sound drivers only allow
    # 44.1 KHz to be selected if all 34 channels are in use, and 176.4KHz requires
    # 10 channels.  We output silence to the unused channels.
    type: Alsa
    channels: 10
    device: "hw:USB24240187,0"
    format: S32LE
    
mixers:

  # Generate a new mono channel for the sub from the left and right channels.
  # Also tweak the L/R balance to compensate for room effects.
  mono:
    channels:
      in: 2
      out: 3
    mapping:
      - dest: 0               # Left channel
        sources:
          - channel: 0
            gain: 0
      - dest: 1               # Right channel
        sources:
          - channel: 1
            gain: 0
      - dest: 2               # New mono channel for sub
        sources:
          - channel: 0        
            gain: -6          # Compensate for summing
          - channel: 1       
            gain: -6           
  
  #  Output silence to all unused output channels.  See comment in devices specification.
  fanout:
    channels:
      in: 3
      out: 10
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
      - dest: 1
        sources:
          - channel: 1
            gain: 0
      - dest: 2
        sources:
          - channel: 2
            gain: 0
      - dest: 3    # Not used
        mute: true
        sources:
          - channel: 2 
            gain: 0
      - dest: 4  # Not used
        mute: true
        sources:
          - channel: 2
            gain: 0
      - dest: 5  # Not used
        mute: true
        sources:
          - channel: 2
            gain: 0
      - dest: 6  # Not used
        mute: true
        sources:
          - channel: 2
            gain: 0
      - dest: 7  # Not used
        mute: true
        sources:
          - channel: 2
            gain: 0
      - dest: 8  # Not used
        mute: true
        sources:
          - channel: 2
            gain: 0
      - dest: 9  # Not used
        mute: true
        sources:
          - channel: 2
            gain: 0

filters:
  # Delay mains to compensate for the CamillaDSP filters on the sub.
  sub_biquad_compensation:
    type: Delay
    parameters:
      delay: 14.2
      unit: ms      

  # Subsonic Protection: 20Hz Butterworth 2nd Order
  subsonic_hp:
    type: Biquad
    parameters:
      type: Highpass
      freq: 20
      q: 0.7071  # Standard Butterworth Q

  # 50Hz Linkwitz-Riley 4th Order Crossover (Part 1)
  sub_lp_1:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 50
      q: 0.7071

  # 50Hz Linkwitz-Riley 4th Order Crossover (Part 2)
  sub_lp_2:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 50
      q: 0.7071

  # Low-end Fill
  sub_shelf:
    type: Biquad
    parameters:
      type: Lowshelf
      freq: 35
      gain: 2.0
      q: 0.7  
  
  # Delay mains to compensate for DSP delay within the sub.
  sub_dsp_compensation:
    type: Delay
    parameters:
      delay: 27
      unit: ms
      subsample: false

  # Delay mains to compensate for distance between sub & plane of mains
  # (32 inches).
  sub_distance_compensation:
    type: Delay
    parameters:
      delay: 2.35
      unit: ms
      subsample: false


pipeline:
  - type: Mixer
    description: "Mix input channels 0 and 1 to new mono channel 2"
    name: mono

  - type: Filter
    channel: 0
    names:
    - sub_biquad_compensation
    - sub_dsp_compensation 
    - sub_distance_compensation

  - type: Filter
    channel: 1
    names:
    - sub_biquad_compensation
    - sub_dsp_compensation
    - sub_distance_compensation

  - type: Filter
    channel: 2
    names:
      - subsonic_hp
      - sub_lp_1
      - sub_lp_2
      - sub_shelf

  - type: Mixer
    description: "Fan out to all channels"
    name: fanout
