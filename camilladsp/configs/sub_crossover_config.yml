title: "Experimental subwoofer crossover"
description: "Based on stepbystep.md in the camilladsp repo."

devices:
  samplerate: 44100
  chunksize: 2048
  capture_samplerate: 44100
  enable_rate_adjust: true
  capture:
    # Read from the default subdevice of the ALSA loopback device.
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S16LE
  playback:
    # Dell Latitude integrated audio 
    type: Alsa
    channels: 2
    device: "hw:1,0"
    # Benchmark DAC
    type: Alsa
    channels: 2
    device: "hw:B20,0"
    format: S32LE

filters:
  infrasonic:
    parameters:
      freq:  20
      type:  HighpassFO
    type: Biquad

# Highpass / Lowpass 2nd order (from camilladsp example "all filters")
  highpass:
    type: Biquad
    parameters:
      type: Highpass
      freq: 100
      q: 1.0

  lowpass:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 100
      q: 1.0


pipeline:
  - type: Filter
    channel: 0
    names:
    - infrasonic


  - type: Filter
    channel: 1
    names:
    - infrasonic

