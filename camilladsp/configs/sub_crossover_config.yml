title: "Subwoofer crossover WIP"
description: "Based on stepbystep.md in the camilladsp repo."

devices:
  samplerate: 44100
  chunksize: 2048
  capture_samplerate: 44100
  enable_rate_adjust: true
  capture:
    # Read from the default subdevice of the ALSA loopback device.
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S16LE
  playback:
    # Dell Latitude integrated audio 
    type: Alsa
    channels: 2
    device: "hw:1,0"
    # Benchmark DAC
    type: Alsa
    channels: 2
    device: "hw:B20,0"
    format: S32LE
    
mixers:
  to4chan:
    description: "Expand 2 channels to 4.  Channel 0 duplicated to channel 2, 1 duplicated to channel 3."
    channels:
      in: 2
      out: 4
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false
      - dest: 2      <---- new!
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 3      <---- new!
        sources:
          - channel: 1
            gain: 0
            inverted: false

filters:
  infrasonic:
    parameters:
      freq:  20
      type:  HighpassFO
    type: Biquad

# Highpass / Lowpass 2nd order (from camilladsp example "all filters")
  highpass:
    type: Biquad
    parameters:
      type: Highpass
      freq: 100
      q: 1.0

  lowpass:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 100
      q: 1.0

# ?? The infrasonic filter probably affects phase.  It should either be on
# ?? the highpass channels or upstream of the mixer. 
pipeline:
  - type: Filter
    channel: 0
    names:
    - infrasonic
    - Lowpass

  - type: Filter
    channel: 1
    names:
    - infrasonic
    - Lowpass

  - type: Filter
    channel: 2
    names:
    - infrasonic
    - Highpass

  - type: Filter
    channel: 3
    names:
    - infrasonic
    - Highpass

